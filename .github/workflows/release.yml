name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            target: tar
            ext: tar.gz
          - os: windows-latest
            goos: windows
            target: zip
            ext: zip
          - os: macos-latest
            goos: darwin
            target: tar
            ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build & Package
        run: go run build.go -goos=${{ matrix.goos }} -version=${{ github.ref_name }} ${{ matrix.target }} syncthing

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "*.${{ matrix.ext }}"
